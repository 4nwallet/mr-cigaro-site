<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ثبت سفارش | آقای سیگارو</title>

<link rel="stylesheet" href="order.css">

</head>

<body>

<div class="container">

    <img
    src="images/logo.png"
    alt="Mr Cigaro"
    class="logo">


    <h1>

        ثبت سفارش

    </h1>


    <p class="subtitle">

        حداکثر زمان انتظار تا دریافت سفارش

    </p>


    <div class="timer-box">

        <div id="countdown">

            01:30:00

        </div>

    </div>


    <div class="steps">

        <h2>

            مراحل ثبت سفارش

        </h2>

        <div class="step">

            ① برند سیگار موردنظر را ارسال کنید.

        </div>

        <div class="step">

            ② تعداد موردنیاز را بنویسید.

        </div>

        <div class="step">

            ③ نام ساختمان و شماره واحد را ارسال کنید.

        </div>

        <div class="step">

            ④ شماره تماس خود را ارسال کنید.

        </div>

        <div class="step">

            ⑤ منتظر تأیید سفارش بمانید.

        </div>

    </div>


    <a
    href="https://wa.me/98XXXXXXXXXX"
    class="whatsapp-btn">

        ثبت سفارش از طریق واتساپ

    </a>

</div>

<script src="order.js"></script>

</body>

</html>
