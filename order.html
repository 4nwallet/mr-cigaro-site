<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ثبت سفارش | آقای سیگارو</title>

<link rel="stylesheet" href="order.css">

</head>


<body>


<div class="container">


    <img 
    src="images/logo.png"
    class="logo"
    alt="Mr Cigaro">


    <h1>
        ثبت سفارش
    </h1>


    <p class="subtitle">
        قبل از ارسال پیام، اطلاعات سفارش خود را آماده کنید.
    </p>



    <!-- وضعیت سفارش -->

    <div id="status-box" class="status-box">

        🟢 آماده دریافت سفارش

    </div>



    <!-- تایمر -->

    <div class="timer-box">


        <div class="timer-title">

            ⏳ حداکثر زمان انتظار تا دریافت سفارش

        </div>


        <div id="countdown">

            01:30:00

        </div>


    </div>




    <!-- مراحل سفارش -->


    <div class="steps">


        <h2>
            اطلاعات موردنیاز
        </h2>



        <div class="step">

            🚬 برند سیگار

        </div>


        <div class="step">

            📦 تعداد موردنیاز

        </div>


        <div class="step">

            🏢 نام ساختمان و شماره واحد

        </div>


        <div class="step">

            📱 شماره تماس

        </div>


        <div class="step">

            ✅ پس از ارسال پیام، منتظر تأیید سفارش بمانید.

        </div>



    </div>




    <!-- دکمه واتساپ -->


    <button 
    id="whatsapp-btn"
    class="whatsapp-btn">


        📲 ثبت سفارش از طریق واتساپ


    </button>




    <!-- پیام انتقال -->


    <div 
    id="redirect-message"
    class="redirect-message">


        در حال انتقال به واتساپ...


    </div>





    <!-- سفارش جدید -->


    <button
    id="new-order-btn"
    class="new-order-btn">


        🔄 شروع سفارش جدید


    </button>




</div>




<script src="order.js"></script>


</body>


</html>
